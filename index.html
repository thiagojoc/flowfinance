<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#080c14">
  <title>FlowFinance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#080c14;}
    body{font-family:'Sora',sans-serif;color:#fff;overscroll-behavior:none;}
    input,button,select,textarea{font-family:'Sora',sans-serif;}
    ::-webkit-scrollbar{display:none;}
    input::placeholder,textarea::placeholder{color:#3a4a5e;}
    input:focus,textarea:focus,select:focus{outline:none;}

    #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    .header{padding:env(safe-area-inset-top,14px) 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,#00e09e,#4f9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .header-badge{background:#0d1525;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:5px 14px;color:#6b7a92;font-size:12px;cursor:pointer;border:none;}
    .content{flex:1;overflow-y:auto;padding:12px 16px 100px;}

    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,12,20,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:grid;grid-template-columns:repeat(5,1fr);padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100;}
    .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;opacity:.6;transition:all .15s;}
    .nav-btn.active{opacity:1;}
    .nav-btn span:first-child{font-size:20px;}
    .nav-btn span:last-child{font-size:10px;color:#8892a4;}
    .nav-btn.active span:last-child{color:#00e09e;}
    .nav-btn.active span:first-child{filter:drop-shadow(0 0 4px rgba(0,224,158,0.5));}

    .card{background:#0d1525;border-radius:16px;padding:20px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.06);}
    .card-hero{background:linear-gradient(135deg,#0e2540,#091a2e);border-radius:20px;padding:24px;margin-bottom:14px;border:1px solid rgba(0,224,158,0.12);}
    .big-num{font-size:36px;font-weight:800;letter-spacing:-1px;}
    .green{color:#00e09e;} .red{color:#ff4d6d;} .blue{color:#4f9eff;} .muted{color:#6b7a92;} .small{font-size:12px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .stat-box{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px;}
    .progress-track{background:rgba(255,255,255,0.05);border-radius:99px;height:5px;overflow:hidden;margin-top:5px;}
    .progress-fill{height:100%;border-radius:99px;transition:width .5s;}

    .btn{border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;width:100%;}
    .btn-primary{background:linear-gradient(135deg,#00e09e,#4f9eff);color:#070b12;}
    .btn-primary:active{opacity:.85;}
    .btn-secondary{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#8892a4;}
    .btn-sm{padding:8px 16px;font-size:13px;width:auto;border-radius:8px;}

    .input{width:100%;background:#141f30;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;transition:border-color .2s;}
    .input:focus{border-color:#00e09e;}
    .textarea{width:100%;background:#141f30;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;resize:none;transition:border-color .2s;min-height:90px;line-height:1.5;}
    .textarea:focus{border-color:#00e09e;}
    select.input option{background:#141f30;color:#fff;}
    .input-group{margin-bottom:14px;}
    .input-label{font-size:11px;color:#6b7a92;margin-bottom:6px;font-weight:700;letter-spacing:.6px;}

    .tx-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
    .tx-item:last-child{border-bottom:none;}
    .tx-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .tx-icon.income{background:rgba(0,224,158,0.1);}
    .tx-icon.expense{background:rgba(255,77,109,0.1);}
    .tx-info{flex:1;min-width:0;}
    .tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize;color:#fff;}
    .tx-meta{font-size:11px;color:#6b7a92;margin-top:2px;}
    .tx-value{font-weight:700;font-size:15px;flex-shrink:0;}
    .tx-delete{background:none;border:none;color:#3a4a5e;cursor:pointer;font-size:11px;padding:4px;margin-left:4px;}

    .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .month-nav button{background:none;border:none;color:#6b7a92;cursor:pointer;font-size:26px;line-height:1;padding:4px 10px;}
    .month-nav h2{font-size:18px;font-weight:700;}

    .section-title{font-size:12px;font-weight:700;color:#8892a4;margin-bottom:14px;letter-spacing:.5px;}
    .divider{height:1px;background:rgba(255,255,255,0.05);margin:16px 0;}
    .tip-box{background:#0d1525;border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,0.05);}
    .tip-box p{font-size:12px;color:#6b7a92;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);margin:0;}
    .tip-box p:last-child{border-bottom:none;}
    .tip-title{font-size:11px;font-weight:700;color:#4a5a6e;margin-bottom:8px;letter-spacing:.5px;}
    .spinner{width:54px;height:54px;border:3px solid rgba(0,224,158,0.15);border-top-color:#00e09e;border-radius:50%;animation:spin .9s linear infinite;}
    .budget-alert{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#ff4d6d;margin-bottom:8px;}
    .budget-warn{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#f59e0b;margin-bottom:8px;}
    .result-ok{background:rgba(0,224,158,0.06);border-radius:18px;padding:22px;border:1px solid rgba(0,224,158,0.16);animation:fadein .35s;}
    .result-err{background:rgba(255,77,109,0.06);border-radius:18px;padding:22px;border:1px solid rgba(255,77,109,0.16);animation:fadein .3s;text-align:center;}
    .settings-table{width:100%;border-collapse:collapse;}
    .settings-table td{padding:8px 4px;vertical-align:middle;}
    .settings-table td:first-child{font-size:13px;color:#8892a4;text-transform:capitalize;width:50%;}
    .number-input{background:#141f30;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 10px;color:#fff;font-size:14px;width:100%;font-family:'Sora',sans-serif;}
    .number-input:focus{outline:none;border-color:#00e09e;}
    .fixed-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
    .sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:99px;}
    .sync-ok{background:rgba(0,224,158,0.1);color:#00e09e;}
    .sync-err{background:rgba(255,77,109,0.1);color:#ff4d6d;}
    .sync-pending{background:rgba(245,158,11,0.1);color:#f59e0b;}

    /* ── Setup Screen ── */
    .setup-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse at top,#0e2540 0%,#080c14 60%);}
    .setup-emoji{font-size:64px;margin-bottom:6px;filter:drop-shadow(0 0 32px rgba(0,224,158,.35));}
    .setup-title{font-size:34px;font-weight:800;background:linear-gradient(135deg,#00e09e,#4f9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-1px;}
    .setup-sub{color:#6b7a92;font-size:14px;margin-bottom:36px;text-align:center;line-height:1.6;}
    .setup-card{width:100%;max-width:360px;background:rgba(13,21,37,0.9);border-radius:24px;padding:28px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);}
    .id-btn{flex:1;padding:18px 10px;border:2px solid rgba(255,255,255,0.08);border-radius:16px;background:rgba(255,255,255,0.03);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;}
    .id-btn:hover{border-color:rgba(0,224,158,0.3);background:rgba(0,224,158,0.05);}
    .id-btn.selected{border-color:#00e09e;background:rgba(0,224,158,0.08);}
    .id-btn .id-emoji{font-size:36px;}
    .id-btn .id-label{font-size:15px;font-weight:700;color:#fff;}
    .id-btn .id-sub{font-size:11px;color:#6b7a92;}

    @keyframes pulse{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.07);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
    @keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const CATS = {
  alimentacao:  {icon:'🛒',color:'#f97316',label:'Alimentação'},
  transporte:   {icon:'🚗',color:'#3b82f6',label:'Transporte'},
  saude:        {icon:'💊',color:'#ec4899',label:'Saúde'},
  lazer:        {icon:'🎮',color:'#a855f7',label:'Lazer'},
  moradia:      {icon:'🏠',color:'#06b6d4',label:'Moradia'},
  educacao:     {icon:'📚',color:'#10b981',label:'Educação'},
  vestuario:    {icon:'👕',color:'#f59e0b',label:'Vestuário'},
  servicos:     {icon:'🔧',color:'#6b7280',label:'Serviços'},
  outros:       {icon:'📦',color:'#94a3b8',label:'Outros'},
  salario:      {icon:'💼',color:'#22c55e',label:'Salário'},
  freelance:    {icon:'💻',color:'#84cc16',label:'Freelance'},
  investimento: {icon:'📈',color:'#34d399',label:'Investimento'},
};
// Helper para normalizar categoria
function normCat(c){ return String(c||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const NAV = [{id:'dashboard',icon:'🏠',label:'Início'},{id:'launch',icon:'🎤',label:'Lançar'},{id:'history',icon:'📋',label:'Histórico'},{id:'charts',icon:'📊',label:'Gráficos'},{id:'settings',icon:'⚙️',label:'Config'}];
const DEFAULT_BUDGETS = {alimentacao:0,transporte:0,saude:0,lazer:0,moradia:0,educacao:0,vestuario:0,servicos:0,outros:0};
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWQluTeirtK_wayHi8NZ64IOEsCZXFSQDm5VbNQR0M4RAr-8PB5bD7bn2BbGj7dHOm/exec";

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const state = {
  view:'setup', month:getYM(new Date()), transactions:[], processing:false,
  listening:false, lastResult:null, syncStatus:'idle',
  settings:{person:'',scriptUrl:SCRIPT_URL,budgets:{...DEFAULT_BUDGETS},fixedExpenses:[]}
};
let chartInstances = {};

function getYM(d){return d.toISOString().slice(0,7);}
function todayStr(){
  var d=new Date();
  var offset=d.getTimezoneOffset();
  var local=new Date(d.getTime()-offset*60000);
  return local.toISOString().slice(0,10);
}
function nowTimeStr(){
  var d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function BRL(n){
  const v = parseFloat(n)||0;
  const parts = v.toFixed(2).split('.');
  const reais = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return 'R$ '+reais+','+parts[1];
}

// ═══════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════
function loadState(){
  try{
    const s=localStorage.getItem('ff_settings');
    const t=localStorage.getItem('ff_transactions');
    if(s) Object.assign(state.settings,JSON.parse(s));
    if(t) state.transactions=JSON.parse(t);
    // Always force the current script URL regardless of what localStorage has
    state.settings.scriptUrl = SCRIPT_URL;
    if(state.settings.person) state.view='dashboard';
  }catch(e){}
}
function saveSettings(){localStorage.setItem('ff_settings',JSON.stringify(state.settings));}
function saveTxLocally(){localStorage.setItem('ff_transactions',JSON.stringify(state.transactions));}

// ═══════════════════════════════════════════════════
// LOCAL AI INTERPRETER
// ═══════════════════════════════════════════════════
function callAI(text){
  return new Promise(resolve=>{
    const t=text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 .,]/g," ");
    const incomeWords=["recebi","ganhei","entrou","salario","freela","renda","me pagaram","caiu","rendimento","dividendo","comissao","lucro","reembolso","recebemos"];
    const type=incomeWords.some(w=>t.includes(w))?"income":"expense";
    // Converte números por extenso para algarismos
    function numExtenso(txt) {
      const unidades = {zero:0,um:1,uma:1,dois:2,duas:2,tres:3,quatro:4,cinco:5,seis:6,sete:7,oito:8,nove:9,dez:10,onze:11,doze:12,treze:13,quatorze:14,catorze:14,quinze:15,dezesseis:16,dezessete:17,dezoito:18,dezenove:19,vinte:20,trinta:30,quarenta:40,cinquenta:50,sessenta:60,setenta:70,oitenta:80,noventa:90,cem:100,cento:100,duzentos:200,duzentas:200,trezentos:300,trezentas:300,quatrocentos:400,quatrocentas:400,quinhentos:500,quinhentas:500,seiscentos:600,seiscentas:600,setecentos:700,setecentas:700,oitocentos:800,oitocentas:800,novecentos:900,novecentas:900};
      const milhares = {mil:1000,milhao:1000000,milhões:1000000,bilhao:1000000000};
      let words = txt.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase()
        .replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(Boolean);
      let total = 0, current = 0;
      for (let w of words) {
        if (unidades[w] !== undefined) { current += unidades[w]; }
        else if (w === 'e') { continue; }
        else if (milhares[w] !== undefined) {
          current = current || 1;
          if (milhares[w] >= 1000000) { total += current * milhares[w]; current = 0; }
          else { current *= milhares[w]; }
        }
      }
      return total + current;
    }

    // Parse value — handles: "5 mil" → 5000 | "cinquenta centavos" → 0.50 | "quatro reais e cinquenta centavos" → 4.50 | "89,90" → 89.90
    let value = 0;
    const tRaw = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/r\$/gi," reais ").replace(/\$/g," reais ");

    // Detecta centavos por extenso: "cinquenta centavos", "vinte e cinco centavos"
    const centExtensoM = tRaw.match(/([a-z\s]{3,}?)\s*centavos?/);
    // Detecta reais por extenso: "quatro reais", "dois reais e cinquenta centavos"
    const realExtensoM = tRaw.match(/([a-z\s]{2,}?)\s*reais?\s*(?:e\s*([a-z\s]{2,}?)\s*centavos?)?(?:\s|$)/);
    // Detecta mil por extenso
    const milM = tRaw.match(/(\d+(?:[.,]\d+)?)\s*mil/);
    // Detecta número puro — ordem importa: tenta formatos específicos antes do genérico
    // Regex corrigido: não confunde 3000 com 3.000
    function parseNumero(s) {
      // Formato europeu: 1.200,50 ou 1.200
      if (s.includes('.') && s.includes(',')) return parseFloat(s.replace(/\./g,'').replace(',','.'));
      // Só vírgula decimal: 89,90
      if (s.includes(',') && /,\d{1,2}$/.test(s)) return parseFloat(s.replace(',','.'));
      // Ponto decimal explícito: 89.90 (2 casas)
      if (s.includes('.') && /\.\d{2}$/.test(s) && s.split('.')[0].length <= 3) return parseFloat(s);
      // Número inteiro puro: 3000, 500, 100
      return parseFloat(s.replace(/\./g,'').replace(',','.'));
    }

    if (milM) {
      value = parseFloat(milM[1].replace(',','.')) * 1000;
    } else if (realExtensoM && numExtenso(realExtensoM[1].trim()) > 0) {
      const reais = numExtenso(realExtensoM[1].trim());
      const centavos = realExtensoM[2] ? numExtenso(realExtensoM[2].trim()) : 0;
      value = reais + centavos / 100;
    } else if (centExtensoM && numExtenso(centExtensoM[1].trim()) > 0) {
      value = numExtenso(centExtensoM[1].trim()) / 100;
    } else if (/centavos?/.test(t)) {
      const cM = t.match(/(\d+)\s*centavos?/);
      const rM = t.match(/(\d+)\s*reais?\s*e\s*\d+\s*centavos?/);
      value = (rM ? parseInt(rM[1]) : 0) + (cM ? parseInt(cM[1]) : 0) / 100;
    } else {
      // Pega o número mais longo encontrado no texto
      const numM = tRaw.match(/(\d{1,3}(?:[.,]\d{3})+(?:[.,]\d{2})?|\d+[.,]\d{2}|\d+)/);
      if (numM) value = parseNumero(numM[1]);
    }
    const person=/esposa|mulher|\bela\b|patroa/.test(t)?'esposa':'eu';
    let paymentMethod=null;
    let cardName=null;
    let installments=1;
    if(t.includes("pix")) paymentMethod="pix";
    else if(/credito|cartao|nubank|inter|\bbb\b/.test(t)) paymentMethod="crédito";
    else if(/debito/.test(t)) paymentMethod="débito";
    else if(/dinheiro|especie|cash/.test(t)) paymentMethod="dinheiro";
    if(t.includes("nubank")) cardName="Nubank";
    else if(t.includes("inter")) cardName="Inter";
    else if(/\bbb\b|banco do brasil/.test(t)) cardName="BB";
    const parcelMatch=t.match(/(\d+)\s*(?:x|vezes|parcelas)/);
    if(parcelMatch) installments=Math.min(24,parseInt(parcelMatch[1]));
    const catRules=[
      {cat:"alimentacao",words:["mercado","supermercado","feira","padaria","acougue","restaurante","lanche","pizza","hamburguer","comida","alimento","pacoca","sorvete","cafe","ifood","rappi","delivery","hortifruti","bolo","salgado","fruta","carne","frango","peixe","acai"]},
      {cat:"transporte",words:["gasolina","combustivel","uber","99","taxi","onibus","metro","estacionamento","pedagio","posto","mototaxi","oleo","pneu","carro"]},
      {cat:"saude",words:["farmacia","remedio","medico","consulta","exame","hospital","clinica","dentista","plano","unimed","academia","gym","suplemento","vitamina"]},
      {cat:"lazer",words:["cinema","teatro","show","netflix","spotify","streaming","viagem","hotel","passeio","praia","parque","jogo","game","bar","balada","festa","churrasco","piscina","serie"]},
      {cat:"transporte",words:["oficina","mecanico","funilaria","borracheiro","autocentro","auto center","troca de oleo","revisao","freio","bateria do carro","pneu","alignment","alinhamento","balanceamento","retifica"]},
      {cat:"moradia",words:["aluguel","condominio","iptu","agua","luz","energia","gas","internet","telefone","celular","manutencao","reforma"]},
      {cat:"educacao",words:["escola","faculdade","curso","livro","material","mensalidade","matricula","nicolas","jiu jitsu","jiu-jitsu","ingles","idioma","apostila"]},
      {cat:"vestuario",words:["roupa","sapato","tenis","blusa","calca","vestido","camisa","shorts","moda","calcado"]},
      {cat:"servicos",words:["cabelo","barbearia","salao","manicure","servico","reparo","conserto","faxina","diarista","mecanico","pintura","eletricista"]},
      {cat:"salario",words:["salario","pro-labore","pro labore","prolabore","holerite"]},
      {cat:"freelance",words:["freela","freelance","projeto","cliente","comissao","servico prestado","flowsales"]},
      {cat:"investimento",words:["investimento","aplicacao","poupanca","dividendo","rendimento","tesouro","fundo"]},
    ];
    let category=type==="income"?"freelance":"outros";
    for(const rule of catRules){if(rule.words.some(w=>t.includes(w))){category=rule.cat;break;}}
    // Extrai descrição de forma inteligente — captura "o quê" e "onde" juntos
    // Ex: "gastei 50 com remédio na farmácia" → "Remédio na Farmácia"
    // Ex: "comprei sofá no shopping em 9x" → "Sofá no Shopping"
    let dTmp = text
      .replace(/\s+e\s+(?:paguei|dividi|coloquei|parcelei|ficou|foi).*$/gi, '')
      .replace(/\s+(?:no cartão|no cartao|no credito|no crédito|no débito|no debito|no pix|em dinheiro|pelo pix|à vista|a vista|em \d+\s*(?:vezes|x)|parcelei|parcelado|em vezes).*$/gi, '')
      .replace(/^(?:gastei|paguei|comprei|recebi|ganhei|fui ao|fui na|fui no|minha esposa|minha mulher)\s+/gi, '')
      .replace(/\d+(?:[.,]\d{1,3})?(?:\s*(?:reais?|real|r\$))?/gi, '')
      .replace(/\b(?:reais?|real|r\$)\b/gi, '')
      .replace(/^(?:um|uma|uns|umas)\s+/gi, '')
      .replace(/\s+/g, ' ').trim();

    let description = dTmp
      .replace(/^(?:de|do|da|num|numa|para|pro|pra|com)\s+/gi, '')
      .replace(/\s+(?:de|do|da|dos|das|um|uma)\s*$/gi, '')
      .trim();

    // Se a descrição é só "no/na X" (sem item antes), remove a preposição: "no shopping" → "shopping"
    const onlyLocMatch = description.match(/^(?:no|na|nos|nas)\s+(.+)$/i);
    if(onlyLocMatch) description = onlyLocMatch[1];

    // Capitaliza cada palavra significativa (exceto preposições internas) para leitura melhor
    if(description){
      const prepos=['no','na','nos','nas','de','do','da','dos','das','com','e','o','a','os','as'];
      description = description.split(' ').map((w,i)=>{
        if(i>0 && prepos.includes(w.toLowerCase())) return w.toLowerCase();
        return w.charAt(0).toUpperCase()+w.slice(1);
      }).join(' ');
    }
    if(!description||description.length<3) description=text.trim().slice(0,40);
    resolve({type,value,category,description,person,paymentMethod,cardName,installments,date:todayStr(),time:nowTimeStr(),valid:value>0});
  });
}

// GOOGLE SHEETS SYNC — integração ao vivo
// ═══════════════════════════════════════════════════
const COUPLE_CODE = "flowfinance_family";

async function syncTx(tx){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")) return;
  try{
    const res = await fetch(url+"?action=add",{method:"POST",body:JSON.stringify({...tx,coupleCode:COUPLE_CODE})});
    const data = await res.json().catch(()=>({}));
    if(data.success){
      state.syncStatus="ok";
    } else {
      // If sync failed, store in pending queue
      const pending = JSON.parse(localStorage.getItem('ff_pending')||'[]');
      pending.push(tx);
      localStorage.setItem('ff_pending', JSON.stringify(pending));
    }
  }catch(e){
    state.syncStatus="error";
    // Store in pending queue for retry
    const pending = JSON.parse(localStorage.getItem('ff_pending')||'[]');
    pending.push(tx);
    localStorage.setItem('ff_pending', JSON.stringify(pending));
  }
}

// Retry pending transactions when connection is restored
async function retryPending(){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")) return;
  const pending = JSON.parse(localStorage.getItem('ff_pending')||'[]');
  if(pending.length === 0) return;
  const success = [];
  for(const tx of pending){
    try{
      const res = await fetch(url+"?action=add",{method:"POST",body:JSON.stringify({...tx,coupleCode:COUPLE_CODE})});
      const data = await res.json().catch(()=>({}));
      if(data.success) success.push(tx.id);
    }catch(e){}
  }
  if(success.length > 0){
    const remaining = pending.filter(t=>!success.includes(t.id));
    localStorage.setItem('ff_pending', JSON.stringify(remaining));
  }
}

async function initSheetStructure(){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")) return;
  try{ await fetch(url+"?action=init",{method:"POST",body:JSON.stringify({coupleCode:COUPLE_CODE})}); }catch(e){}
}

async function deleteTxFromSheets(id){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")) return;
  try{ await fetch(url+"?action=delete",{method:"POST",body:JSON.stringify({id,coupleCode:COUPLE_CODE})}); }catch(e){}
}

async function fetchFromSheets(){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")) return;
  try{
    state.syncStatus="syncing";
    // Fetch transactions, budget, and fixed expenses simultaneously
    const [txRes, budgetRes, fixedRes] = await Promise.all([
      fetch(`${url}?action=get&code=${COUPLE_CODE}`),
      fetch(`${url}?action=getBudget`),
      fetch(`${url}?action=getFixed`).catch(()=>null)
    ]);
    // Update fixed expenses from Sheets
    if(fixedRes && fixedRes.ok){
      const fd = await fixedRes.json();
      if(fd.fixedExpenses && Array.isArray(fd.fixedExpenses)){
        state.settings.fixedExpenses = fd.fixedExpenses;
        saveSettings();
      }
    }
    // Update budget from Sheets
    if(budgetRes.ok){
      const bd = await budgetRes.json();
      if(bd.budgets && Object.keys(bd.budgets).length > 0){
        Object.entries(bd.budgets).forEach(([k,v])=>{ state.settings.budgets[normCat(k)]=v; });
        saveSettings();
      }
    }
    // Update transactions from Sheets
    if(!txRes.ok) throw new Error("HTTP "+txRes.status);
    const data = await txRes.json();
    if(data.transactions && Array.isArray(data.transactions) && data.transactions.length > 0){
      const normalized = data.transactions.map(t => {
        let d = String(t.date||'');
        if(d.match(/^\d{2}\/\d{2}\/\d{4}$/)){
          const parts = d.split('/');
          d = parts[2]+'-'+parts[1]+'-'+parts[0];
        }
        return {...t, date:d, category:normCat(t.category), timestamp:parseInt(t.id)||t.timestamp||0};
      });
      const sheetsIds = new Set(normalized.map(t=>String(t.id)));
      const localOnly = state.transactions.filter(t=>!sheetsIds.has(String(t.id)));
      state.transactions = [...normalized, ...localOnly].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
      saveTxLocally();
    }
    state.syncStatus="ok";
  }catch(e){
    state.syncStatus="error";
    console.warn("Sheets sync error:", e);
  }
}

// ═══════════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════════
function getMonthTx(m){return state.transactions.filter(t=>t.date&&t.date.startsWith(m||state.month));}
function calcIncome(txs){return txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.value,0);}
function calcExpense(txs){return txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.value,0);}
function getCatTotals(txs){
  const map={};
  txs.filter(t=>t.type==="expense").forEach(t=>{map[t.category]=(map[t.category]||0)+t.value;});
  return Object.entries(map).map(([k,v])=>({name:k,value:v,...(CATS[k]||{icon:'📦',color:'#94a3b8'})})).sort((a,b)=>b.value-a.value);
}
function budgetProgress(cat,total){
  const budget=state.settings.budgets[cat]||0;
  if(!budget) return null;
  const pct=Math.min(200,Math.round(total/budget*100));
  return{budget,pct,color:pct>=100?'#ff4d6d':pct>=80?'#f59e0b':'#00e09e'};
}

function initCharts(){
  const mt=getMonthTx();
  const [y,m]=state.month.split('-').map(Number);
  const catTotals=getCatTotals(mt);
  const tt=({active,payload})=>{
    if(!active||!payload?.length) return null;
    return`<div style="background:#141f30;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;font-size:12px;">${payload.map(p=>`<p style="color:${p.color};margin:2px;">${p.name}: ${BRL(p.value)}</p>`).join('')}</div>`;
  };
  const catCtx=document.getElementById('catChart');
  if(catCtx){
    if(catTotals.length===0){catCtx.parentElement.innerHTML+='<p style="text-align:center;padding:20px;color:#6b7a92;font-size:13px;">Sem despesas neste mês</p>';}
    else{chartInstances.cat=new Chart(catCtx,{type:'doughnut',data:{labels:catTotals.map(c=>c.name),datasets:[{data:catTotals.map(c=>c.value),backgroundColor:catTotals.map(c=>c.color),borderWidth:2,borderColor:'#0d1525'}]},options:{responsive:true,plugins:{legend:{display:true,position:'bottom',labels:{color:'#8892a4',font:{size:11},padding:12}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${BRL(ctx.raw)}`}}}}});}
  }
  const daysInMonth=new Date(y,m,0).getDate();
  const dailyData=Array.from({length:daysInMonth},(_,i)=>{const d=String(i+1).padStart(2,'0'),dt=`${state.month}-${d}`;return{day:i+1,exp:mt.filter(t=>t.date===dt&&t.type==='expense').reduce((s,t)=>s+t.value,0),inc:mt.filter(t=>t.date===dt&&t.type==='income').reduce((s,t)=>s+t.value,0)};}).filter(d=>d.exp>0||d.inc>0);
  const cOpts={plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${BRL(ctx.parsed.y)}`}}},scales:{x:{grid:{display:false},ticks:{color:'#6b7a92',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b7a92',font:{size:10},callback:v=>BRL(v)}}}};
  const dailyCtx=document.getElementById('dailyChart');
  if(dailyCtx){chartInstances.daily=new Chart(dailyCtx,{type:'bar',data:{labels:dailyData.map(d=>d.day),datasets:[{label:'Despesa',data:dailyData.map(d=>d.exp),backgroundColor:'rgba(255,77,109,0.7)',borderRadius:3},{label:'Receita',data:dailyData.map(d=>d.inc),backgroundColor:'rgba(0,224,158,0.7)',borderRadius:3}]},options:{...cOpts,plugins:{...cOpts.plugins,legend:{display:true,position:'bottom',labels:{color:'#8892a4',font:{size:11},padding:10}}}}});}
  const last6=Array.from({length:6},(_,i)=>{const dt=new Date(y,m-1-i,1),mk=getYM(dt),mTxs=state.transactions.filter(t=>t.date?.startsWith(mk));return{name:MONTHS[dt.getMonth()].slice(0,3),exp:calcExpense(mTxs),inc:calcIncome(mTxs)};}).reverse();
  const trendCtx=document.getElementById('trendChart');
  if(trendCtx){chartInstances.trend=new Chart(trendCtx,{type:'bar',data:{labels:last6.map(m=>m.name),datasets:[{label:'Receita',data:last6.map(m=>m.inc),backgroundColor:'rgba(0,224,158,0.7)',borderRadius:3},{label:'Despesa',data:last6.map(m=>m.exp),backgroundColor:'rgba(255,77,109,0.7)',borderRadius:3}]},options:{...cOpts,plugins:{...cOpts.plugins,legend:{display:true,position:'bottom',labels:{color:'#8892a4',font:{size:11},padding:12}}}}});}
}

function renderFixedList(){
  const list=state.settings.fixedExpenses;
  if(list.length===0) return'<p class="muted small" style="padding:8px 0;">Nenhum gasto fixo cadastrado.</p>';
  const paidNames=getPaidFixed();
  const activeList=list.filter(f=>f.active!==false);
  const paidTotal=activeList.filter(f=>paidNames.includes(f.name)).reduce((s,f)=>s+(f.amount||0),0);
  const paidCount=activeList.filter(f=>paidNames.includes(f.name)).length;
  let out=list.map((f,i)=>{
    const isPaid=paidNames.includes(f.name);
    return`<div class="fixed-item" style="${isPaid?'opacity:0.6;':''}">
      <div style="display:flex;align-items:center;gap:10px;flex:1;">
        <input type="checkbox" ${isPaid?'checked':''} onchange="toggleFixedPaid('${f.name.replace(/'/g,"\\\\'")}')"

        <div>
          <div style="font-size:13px;font-weight:500;${isPaid?'text-decoration:line-through;':''}">${CATS[f.category]?.icon||'📦'} ${f.name}</div>

        </div>

  }).join('');
  if(activeList.length>0){
    out+=`<div style="display:flex;justify-content:space-between;padding:10px 0 2px;margin-top:6px;border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:#6b7a92;">

  return out;
}

function navigate(view){state.view=view;state.lastResult=null;state.listening=false;render();}

function setMonthRef(val){state.month=val;render();}
function setMonthRefFromSelects(){
  const m = document.getElementById('refMonth')?.value;
  const y = document.getElementById('refYear')?.value;
  if(m && y){
    state.month = y + '-' + String(m).padStart(2,'0');
    render();
  }
}

function detectCreditInText(text){
  const t=text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const isCredit=/credito|cartao|nubank|inter|\bbb\b/.test(t);
  const fields=document.getElementById('quickCardFields');
  if(fields) fields.style.display=isCredit?'block':'none';
  // Auto-select card if mentioned
  if(isCredit){
    const cardEl=document.getElementById('quickCard');
    if(cardEl){
      if(t.includes('nubank')) cardEl.value='Nubank';
      else if(t.includes('inter')) cardEl.value='Inter';
      else if(/\bbb\b|banco do brasil/.test(t)) cardEl.value='BB';
    }
    const instEl=document.getElementById('quickInstallments');
    if(instEl){
      const m=t.match(/(\d+)\s*(?:x|vezes|parcelas)/);
      if(m) instEl.value=Math.min(12,parseInt(m[1]));
    }
  }
}

async function handleTextSubmit(){
  const input=document.getElementById('cmdInput');
  const text=input?.value?.trim();
  if(!text) return;
  state.processing=true;state.lastResult=null;render();
  try{
    const parsed=await callAI(text);
    // Grab card fields from quick selector if visible
    const quickCard=document.getElementById('quickCard');
    const quickInst=document.getElementById('quickInstallments');
    const quickFields=document.getElementById('quickCardFields');
    if(quickFields&&quickFields.style.display!=='none'&&parsed.paymentMethod==='crédito'){
      if(quickCard) parsed.cardName=quickCard.value;
      if(quickInst) parsed.installments=parseInt(quickInst.value)||1;
    }
    if(!parsed.valid){state.lastResult={ok:false,msg:'Não reconheci o valor. Tente: "Gastei 89 reais no mercado"'};}
    else{await saveTx(parsed);state.lastResult={ok:true,tx:parsed};}
  }catch(e){state.lastResult={ok:false,msg:'Erro: '+e.message};}
  state.processing=false;render();
}

let recognition=null;
function handleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Use o Chrome ou o ditado nativo do iPhone (microfone 🎤 no teclado).");return;}
  if(state.listening){recognition?.stop();return;}
  recognition=new SR();
  recognition.lang="pt-BR";recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{
    state.listening=true;
    const btn=document.getElementById("voiceBtn");
    if(btn){btn.textContent="⏹ Parar";btn.style.background="rgba(255,77,109,0.15)";btn.style.borderColor="rgba(255,77,109,0.3)";btn.style.color="#ff4d6d";}
    const inp=document.getElementById("cmdInput");if(inp) inp.placeholder="🎤 Ouvindo...";
  };
  recognition.onresult=e=>{const txt=Array.from(e.results).map(r=>r[0].transcript).join("");const inp=document.getElementById("cmdInput");if(inp) inp.value=txt;};
  recognition.onend=()=>{
    state.listening=false;
    const btn=document.getElementById("voiceBtn");
    if(btn){btn.textContent="🎤 Voz";btn.style.background="";btn.style.borderColor="";btn.style.color="";}
    const inp=document.getElementById("cmdInput");if(inp&&inp.placeholder.includes("Ouvindo")) inp.placeholder='Ex: "Gastei 89 reais no mercado"';
  };
  recognition.onerror=e=>{
    state.listening=false;
    const btn=document.getElementById("voiceBtn");if(btn){btn.textContent="🎤 Voz";btn.style.background="";btn.style.borderColor="";btn.style.color="";}
    if(e.error==="not-allowed") alert("Permissão do microfone negada. Clique no cadeado na barra do Chrome e habilite.");
    else if(e.error==="no-speech") alert("Nenhuma fala detectada. Tente novamente.");
  };
  recognition.start();
}

function handleManualSubmit(){
  const type=document.getElementById('mType')?.value,value=parseFloat(document.getElementById('mValue')?.value),desc=document.getElementById('mDesc')?.value?.trim(),cat=document.getElementById('mCat')?.value,person=document.getElementById('mPerson')?.value,payment=document.getElementById('mPayment')?.value,date=document.getElementById('mDate')?.value||todayStr();
  if(!desc||!value||value<=0){alert('Preencha descrição e valor.');return;}
  const cardName=payment==='crédito'?(document.getElementById('mCard')?.value||null):null;
  const installments=payment==='crédito'?parseInt(document.getElementById('mInstallments')?.value||'1'):1;
  saveTx({type,value,description:desc,category:cat,person,paymentMethod:payment,cardName,installments,date,time:nowTimeStr(),valid:true});
  state.lastResult={ok:true,tx:{type,value,description:desc,category:cat,person,paymentMethod:payment,cardName,installments,date,time:nowTimeStr()}};render();
}

async function saveTx(parsed){
  const tx={...parsed,id:Date.now(),timestamp:Date.now()};
  if(parsed.person==='esposa') tx.person='esposa';
  else tx.person=state.settings.person==='patrão'?'eu':'esposa';
  tx.category = normCat(tx.category);
  // Card fields from manual form if present
  if(!tx.cardName){
    const cardEl=document.getElementById('mCard');
    const instEl=document.getElementById('mInstallments');
    if(cardEl&&tx.paymentMethod==='crédito') tx.cardName=cardEl.value;
    if(instEl&&tx.paymentMethod==='crédito') tx.installments=parseInt(instEl.value)||1;
  }
  state.transactions.unshift(tx);
  saveTxLocally();
  syncTx(tx).catch(()=>{});
  return tx;
}

async function launchFixed(idx){
  const f=state.settings.fixedExpenses[idx];if(!f) return;
  const tx={type:'expense',value:f.amount,description:f.name,category:f.category,person:state.settings.person==='patrão'?'eu':'esposa',paymentMethod:f.paymentMethod||null,date:todayStr(),valid:true};
  tx.time=nowTimeStr();await saveTx(tx);state.lastResult={ok:true,tx};render();
}

async function handleDelete(id){
  if(!confirm('Excluir esta transação?')) return;
  state.transactions=state.transactions.filter(t=>String(t.id)!==String(id));
  saveTxLocally();deleteTxFromSheets(id).catch(()=>{});render();
}

function resetLaunch(){state.lastResult=null;render();}
function toggleCardFields(prefix){
  const pay = document.getElementById(prefix+'Payment')?.value || document.getElementById(prefix+'mPayment')?.value;
  const fields = document.getElementById(prefix+'CardFields');
  if(fields) fields.style.display = pay==='crédito' ? 'block' : 'none';
}
function toggleManual(){
  const form=document.getElementById('manualForm'),btn=document.getElementById('manualToggle');
  if(!form) return;
  const show=form.style.display==='none';
  form.style.display=show?'block':'none';
  if(btn) btn.textContent=show?'− Fechar formulário manual':'+ Lançamento manual (sem IA)';

function saveScript(){
  const url=document.getElementById('cfgScript')?.value?.trim();
  if(!url){alert('Cole a URL do Apps Script.');return;}
  state.settings.scriptUrl=url;saveSettings();
  alert('URL salva! Inicializando planilha e testando conexão...');
  initSheetStructure().then(()=>
    fetchFromSheets().then(()=>{render();alert(state.syncStatus==='ok'?'✅ Conectado com sucesso!':'❌ Não consegui conectar. Verifique a URL e se o script está publicado como "Qualquer pessoa".');})
  );
}

function saveBudgets(){
  document.querySelectorAll('[data-budget]').forEach(inp=>{state.settings.budgets[inp.dataset.budget]=parseFloat(inp.value)||0;});
  saveSettings();alert('Orçamentos salvos!');
}

function addFixed(){
  const name=document.getElementById('fName')?.value?.trim(),cat=document.getElementById('fCat')?.value,amount=parseFloat(document.getElementById('fAmount')?.value)||0,dueDay=parseInt(document.getElementById('fDay')?.value)||null,payment=document.getElementById('fPayment')?.value;
  if(!name||!amount){alert('Preencha nome e valor.');return;}
  state.settings.fixedExpenses.push({name,category:cat,amount,dueDay,paymentMethod:payment,active:true});
  saveSettings();document.getElementById('fixedList').innerHTML=renderFixedList();
  ['fName','fAmount','fDay'].forEach(id=>{const el=document.getElementById(id);if(el) el.value='';});

function removeFixed(idx){
  if(!confirm('Remover?')) return;
  state.settings.fixedExpenses.splice(idx,1);saveSettings();document.getElementById('fixedList').innerHTML=renderFixedList();
}

async function syncNow(){
  await fetchFromSheets();render();
  alert(state.syncStatus==='ok'?'✅ Dados sincronizados!':'❌ Erro ao sincronizar. Verifique a URL do Apps Script nas configurações.');
}

function exportCSV(){
  const rows=[['Data','Descrição','Categoria','Tipo','Valor','Quem','Pagamento']];
  state.transactions.forEach(t=>rows.push([t.date||'',( t.description||'').replace(/,/g,' '),t.category||'',t.type==='income'?'Receita':'Despesa',(t.value||0).toFixed(2).replace('.',','),t.person==='eu'?'Patrão':'Patroa',t.paymentMethod||'']));
  const csv=rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='flowfinance-'+state.month+'.csv';a.click();URL.revokeObjectURL(url);
}

function clearAll(){if(!confirm('Apagar TODOS os dados locais?')) return;state.transactions=[];saveTxLocally();alert('Dados locais apagados. Sheets intacto.');render();}

async function syncBudgetFromSheet(){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")){alert('Script não configurado.');return;}
  try{
    const res = await fetch(`${url}?action=getBudget`);
    const data = await res.json();
    if(data.budgets){
      // Normalize keys from Sheets
      const normalized = {};
      Object.entries(data.budgets).forEach(([k,v])=>{ normalized[normCat(k)]=v; });
      Object.assign(state.settings.budgets, normalized);
      saveSettings();
      alert('✅ Limites sincronizados da planilha!');
      render();
    } else {
      alert('Não foi possível buscar os limites. Verifique se a aba Orcamento está preenchida.');
    }
  }catch(e){
    alert('Erro ao sincronizar: '+e.message);
  }
}
function handleLogout(){if(!confirm('Trocar identificação?')) return;state.settings.person='';saveSettings();_selectedPerson='';state.view='setup';render();}

// EDIT TRANSACTION

function openEditFromResult(){
  if(!state.lastResult?.tx?.id) return;
  const id = state.lastResult.tx.id;
  state.view = 'historico';
  render();
  setTimeout(()=>openEdit(id), 80);
}
function openEdit(id){
  const tx = state.transactions.find(t=>String(t.id)===String(id));
  if(!tx) return;
  const modal = document.getElementById('editModal');
  if(!modal) return;
  document.getElementById('editId').value = id;
  document.getElementById('editDesc').value = tx.description || '';
  document.getElementById('editType').value = tx.type || 'expense';
  document.getElementById('editValue').value = tx.value || '';
  document.getElementById('editCat').value = tx.category || 'outros';
  document.getElementById('editPerson').value = tx.person || 'eu';
  document.getElementById('editPayment').value = tx.paymentMethod || 'pix';
  document.getElementById('editDate').value = tx.date || todayStr();
  modal.style.display = 'flex';
}
function closeEdit(){
  const modal = document.getElementById('editModal');
  if(modal) modal.style.display = 'none';
}
async function saveEdit(){
  const id = document.getElementById('editId').value;
  const idx = state.transactions.findIndex(t=>String(t.id)===String(id));
  if(idx === -1) return;
  const updated = {
    ...state.transactions[idx],
    description: document.getElementById('editDesc').value,
    type: document.getElementById('editType').value,
    value: parseFloat(document.getElementById('editValue').value) || 0,
    category: normCat(document.getElementById('editCat').value),
    person: document.getElementById('editPerson').value,
    paymentMethod: document.getElementById('editPayment').value,
    date: document.getElementById('editDate').value,
  };
  state.transactions[idx] = updated;
  saveTxLocally();
  // Update in Sheets: use updateTransaction action (no delete+add = no duplicate)
  const url = state.settings.scriptUrl;
  if(url && !url.includes('SEU_SCRIPT')){
    try{
      await fetch(url+'?action=update',{method:'POST',body:JSON.stringify({...updated,coupleCode:'flowfinance_family'})});
    }catch(e){}
  }
  closeEdit();
  render();
}

// ── iOS Safari voice — hold to record ─────────────────────────────
let _voiceRec = null;
function handleVoiceStart(e){
  e.preventDefault();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("Reconhecimento de voz não suportado. Use o 🎤 do teclado no iPhone."); return; }
  if(_voiceRec){ try{_voiceRec.stop();}catch(e){} }
  _voiceRec = new SR();
  _voiceRec.lang = "pt-BR";
  _voiceRec.continuous = true;
  _voiceRec.interimResults = true;
  _voiceRec.onstart = () => {
    const btn = document.getElementById("voiceBtn");
    if(btn){ btn.textContent="🔴 Gravando..."; btn.style.background="rgba(255,77,109,0.2)"; btn.style.borderColor="rgba(255,77,109,0.4)"; btn.style.color="#ff4d6d"; }
  };
  _voiceRec.onresult = e => {
    const txt = Array.from(e.results).map(r=>r[0].transcript).join("");
    const inp = document.getElementById("cmdInput");
    if(inp) inp.value = txt;
  };
  _voiceRec.onerror = e => {
    const btn = document.getElementById("voiceBtn");
    if(btn){ btn.textContent="🎤 Segure"; btn.style.background=""; btn.style.borderColor=""; btn.style.color=""; }
    if(e.error==="not-allowed") alert("Permissão do microfone negada. Vá em Configurações > Safari > Microfone e habilite.");
  };
  _voiceRec.start();
}
function handleVoiceEnd(e){
  e.preventDefault();
  if(_voiceRec){ try{_voiceRec.stop();}catch(e){} _voiceRec=null; }
  const btn = document.getElementById("voiceBtn");
  if(btn){ btn.textContent="🎤 Segure"; btn.style.background=""; btn.style.borderColor=""; btn.style.color=""; }
}

// ═══════════════════════════════════════════════════
// BUDGET TABLE RENDER
// ═══════════════════════════════════════════════════
function normalizecat(c){
  return String(c||'').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function renderBudgetTable(s){
  const spent = calcBudgetStatus(state.transactions, state.month);
  let out = '';
  Object.keys(DEFAULT_BUDGETS).forEach(function(cat){
    const limit = s.budgets[cat]||0;
    const gastou = spent[cat]||0;
    const saldo = limit - gastou;
    const pct = limit > 0 ? Math.min(100, Math.round(gastou/limit*100)) : 0;
    const cor = pct>=100?'#ff4d6d':pct>=80?'#f59e0b':'#00e09e';
    const label = CATS[cat]?.label||cat;
    out += '<div style="margin-bottom:14px;">';
    out += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    out += '<span style="font-size:13px;font-weight:600;">'+(CATS[cat]?.icon||'📦')+' '+label+'</span>';
    out += '<span style="font-size:12px;color:#6b7a92;">'+(limit>0?'Limite: '+BRL(limit):'Sem limite')+'</span>';
    out += '</div>';
    out += '<div style="display:flex;justify-content:space-between;margin-bottom:5px;">';
    out += '<span style="font-size:13px;color:'+cor+';font-weight:600;">Gasto: '+BRL(gastou)+'</span>';
    out += '<span style="font-size:13px;color:'+(saldo>=0?'#00e09e':'#ff4d6d')+';font-weight:600;">Saldo: '+BRL(saldo)+'</span>';
    out += '</div>';
    if(limit>0) out += '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%;background:'+cor+';"></div></div>';
    out += '</div>';
  });
  return out;
}
// ═══════════════════════════════════════════════════
// BUDGET SYNC FROM SHEETS
// ═══════════════════════════════════════════════════
async function fetchBudgetFromSheets(){
  const url = state.settings.scriptUrl;
  if(!url||url.includes("SEU_SCRIPT")) return null;
  try{
    const res = await fetch(`${url}?action=getBudget`);
    if(!res.ok) return null;
    const data = await res.json();
    return data.budgets || null;
  }catch(e){ return null; }
}

function calcBudgetStatus(txs, month){
  const mt = txs.filter(t=>t.date&&t.date.startsWith(month)&&t.type==='expense');
  const map = {};
  mt.forEach(t=>{
    const cat = t.category||'outros';
    map[cat] = (map[cat]||0) + t.value;
  });
  return map;
}

loadState();

// Retry any pending transactions first
retryPending().catch(()=>{});

// Always fetch from Sheets on load — this is the source of truth
// Shows loading state while fetching, then renders with full data
if(state.settings.person && state.settings.scriptUrl && !state.settings.scriptUrl.includes('SEU_SCRIPT')){
  // Show app immediately with cached data
  render();
  // Then sync from Sheets in background
  state.syncStatus = 'syncing';
  fetchFromSheets().then(function(){
    render(); // Re-render with fresh data from Sheets
  }).catch(function(){
    state.syncStatus = 'error';
    render();
  });
} else {
  render();
}
